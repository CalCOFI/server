version: "3.7"

volumes:
  caddy_data:
  caddy_config:
  shiny_apps:
  postgis_data:

services:
  caddy:
    container_name: caddy
    image: caddy:latest
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - /share:/share    

  rstudio:
    build:
      context: ./rstudio
      args:
        PASSWORD: $PASSWORD
    container_name: rstudio
    environment:
      ROOT: 'true'
      USER: admin
      PASSWORD: $PASSWORD
      ADD: shiny
    ports:
      - 8787:8787
      - 3838:3838
    restart: unless-stopped
    volumes:
      - /share:/share    
      - shiny_apps:/srv/shiny-server
      
  postgis:
    container_name: postgis
    image: postgis/postgis:17-3.5
    environment:
      POSTGRES_DB: gis
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: $PASSWORD
    volumes:
      - postgis_data:/var/lib/postgresql
      - ./postgis/postgresql.conf:/etc/postgresql/postgresql.conf
      - /share:/share
    restart: unless-stopped
    healthcheck:
      test: 'exit 0'
    ports:
      - 5432:5432
      
  pg_backups:
    container_name: pg_backups
    image: prodrigestivill/postgres-backup-local:17
    restart: always
    user: postgres:postgres # Optional: see below
    volumes:
      - /share/pg_backups:/backups
      # sudo mkdir /share/pg_backups; sudo chown -R 999:999 /share/pg_backups
    links:
      - postgis
    depends_on:
      - postgis
    environment:
      - POSTGRES_HOST=postgis
      - POSTGRES_DB=gis
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=${PASSWORD}
      - POSTGRES_EXTRA_OPTS=-Z6 --blobs
      - SCHEDULE=@daily
      #- SCHEDULE='0 19 * * * *'
      - BACKUP_KEEP_DAYS=7
      - BACKUP_KEEP_WEEKS=4
      - BACKUP_KEEP_MONTHS=6
      - HEALTHCHECK_PORT=8000

  rclone:
    build: ./rclone
    container_name: rclone
    restart: unless-stopped
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '10'
    volumes:
      - /share/rclone:/config/rclone
      - /share:/share
      # calcofi-admin SA key for the gdrive->gcs sync (must exist on host first;
      # create with rclone/setup_service_account.sh, then scp to the VM)
      - /etc/rclone/calcofi-admin-sa.json:/config/rclone/calcofi-admin-sa.json:ro

  pgadmin:
    container_name: pgadmin
    image: dpage/pgadmin4:latest
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ben@ecoquants.com
      PGADMIN_DEFAULT_PASSWORD: ${PASSWORD}
      PGADMIN_LISTEN_PORT: 8088
      #PGADMIN_CONFIG_CONFIG_DATABASE_URI: "'postgresql://admin:$PASSWORD@postgis:5432/gis'"
      # test: psql -h postgis -U admin -d gis
    ports:
      - 8088:8088
    volumes:
      - /share/pgadmin:/var/lib/pgadmin
    depends_on:
      - postgis

  plumber:
    container_name: plumber
    build: ./plumber
    ports:
      - 8888:8888
    restart: unless-stopped
    volumes:
      - /share:/share
    depends_on:
      - postgis

  pg_tileserv:
    container_name: pg_tileserv
    environment:
      DATABASE_URL: postgres://admin:$PASSWORD@postgis:5432/gis
    image: pramsey/pg_tileserv:latest
    build:
      context: ./pg_tileserv
      dockerfile: Dockerfile.alpine
      args: 
        VERSION: latest
    depends_on:
      - postgis
    ports:
      - 7800:7800

  pg_rest:
    container_name: pg_rest
    environment:
      PGRST_DB_URI: postgres://ro_user:$ROPASS@postgis:5432/gis
      # {"code":"PGRST000","details":"could not translate host name \"lcof1@postgis\"
      PGRST_OPENAPI_SERVER_PROXY_URI: http://127.0.0.1:3000
      PGRST_DB_ANON_ROLE: ro_user  # db-anon-role
    image: postgrest/postgrest
    depends_on:
      - postgis
    ports:
      - "3000:3000"

  pg_swagger:
    container_name: pg_swagger
    image: swaggerapi/swagger-ui
    depends_on:
      - pg_rest
    ports:
      - "8080:8080"
    expose:
      - "8080"
    environment:
      API_URL: https://rest.calcofi.io/

  # Self-heal guard for ERDDAP config. ERDDAP's content dir is a bind-mount of
  # the CalCOFI/erddap repo (cloned to /share/github/CalCOFI/erddap). If that
  # clone is absent, Docker silently auto-creates an EMPTY mount dir, ERDDAP
  # boots with no setup.xml, and every request to /erddap returns "404 Not
  # Found" with no obvious cause. This one-shot container detects the missing
  # config and clones it into the content dir, so a fresh host self-heals and
  # the failure is loud in the logs instead of a silent 404.
  erddap_init:
    container_name: erddap_init
    image: alpine/git:latest
    entrypoint: /bin/sh
    command:
      - -c
      - |
        if [ -f /content/setup.xml ]; then
          echo "[erddap_init] content/setup.xml present - OK";
        else
          echo "[erddap_init] content/setup.xml MISSING - cloning CalCOFI/erddap config...";
          git clone --depth 1 https://github.com/CalCOFI/erddap.git /tmp/cfg \
            && cp -a /tmp/cfg/content/. /content/ \
            && echo "[erddap_init] seeded content from CalCOFI/erddap" \
            || { echo "[erddap_init] FAILED to seed ERDDAP content"; exit 1; };
        fi
    volumes:
      - /share/github/CalCOFI/erddap/content:/content
    restart: "no"

  erddap:
    container_name: erddap
    image: erddap/erddap:latest
    restart: unless-stopped
    depends_on:
      erddap_init:
        condition: service_completed_successfully
    ports:
      - "8090:8080"
    volumes:
      - /share/github/CalCOFI/erddap/content:/usr/local/tomcat/content/erddap
      - /share/erddap/data:/erddapData
      - /share/erddap/datasets:/datasets
      # CalCOFI branding. The webapp dir is baked into the image (not persistent):
      #  - logo served at /erddap/images/calcofi.svg (referenced by startBodyHtml5)
      #  - messages.xml overrides only <startBodyHtml5> for the CalCOFI header.
      # NOTE: a content/erddap/messages.xml does NOT work in ERDDAP 2.30.0 (it
      # replaces the default base and is parsed with stricter flags), so the
      # edited file is mounted over the classpath messages.xml instead. It is a
      # full copy of the image default with only startBodyHtml5 changed; re-derive
      # it from the new default on ERDDAP upgrade.
      - /share/github/CalCOFI/erddap/content/images/calcofi.svg:/usr/local/tomcat/webapps/erddap/images/calcofi.svg:ro
      - /share/github/CalCOFI/erddap/messages.xml:/usr/local/tomcat/webapps/erddap/WEB-INF/classes/gov/noaa/pfel/erddap/util/messages.xml:ro
    environment:
      ERDDAP_MEMORY: 4g
      ERDDAP_baseUrl: http://localhost:8090
      ERDDAP_baseHttpsUrl: https://erddap.calcofi.io
      # Stable flagKeyKey (secret, from .env). Without it the entrypoint
      # generates a new random value on every restart, invalidating dataset
      # reload flag URLs and email-subscription keys.
      ERDDAP_flagKeyKey: ${ERDDAP_flagKeyKey}
      ERDDAP_bigParentDirectory: /erddapData/
      ERDDAP_adminInstitution: CalCOFI
      ERDDAP_adminInstitutionUrl: https://calcofi.io
      ERDDAP_adminIndividualName: CalCOFI Data Manager
      ERDDAP_adminPosition: Data Manager
      ERDDAP_adminCity: La Jolla
      ERDDAP_adminStateOrProvince: CA
      ERDDAP_adminPostalCode: "92037"
      ERDDAP_adminCountry: USA
      ERDDAP_adminEmail: calcofi@ucsd.edu

  # FastAPI port of api-h3t (CalCOFI/api-h3t-py) serving h3t.calcofi.io behind
  # Varnish (varnish/default.vcl backend). Replaced the R Plumber service
  # (h3t_api), decommissioned after cutover. Same wire protocol.
  # See api-h3t-py/deploy.md for the cutover/rollback history.
  h3t_api_py:
    container_name: h3t_api_py
    build: /share/github/CalCOFI/api-h3t-py
    restart: unless-stopped
    environment:
      # legacy single-DB mode → registers as db name "default".
      DUCKDB_PATH: /data/calcofi_latest.duckdb
      H3T_PORT: 8889
      H3T_HOST: 0.0.0.0
      # Varnish strips Accept-Encoding before the cache lookup and Caddy gzips
      # at the edge, so the backend always serves plain JSON.
      H3T_APP_GZIP: "false"
    volumes:
      # mount the released DuckDB files read-only. calcofi_latest.duckdb
      # is a symlink to the current versioned release.
      - /share/github/CalCOFI/int-app/data:/data:ro
    expose:
      - "8889"

  varnish:
    container_name: varnish
    image: varnish:7
    restart: unless-stopped
    environment:
      VARNISH_SIZE: 1G
    volumes:
      - ./varnish/default.vcl:/etc/varnish/default.vcl:ro
    expose:
      - "80"
    depends_on:
      # Varnish compiles its VCL at startup, which resolves the backend
      # hostname via DNS. If the backend isn't running yet, compile fails.
      h3t_api_py:
        condition: service_healthy
